name: head

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: head
  cancel-in-progress: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, musl: true }
          - {
              os: ubuntu-24.04-arm,
              target: aarch64-unknown-linux-musl,
              musl: true,
            }
          - { os: macos-15-intel, target: x86_64-apple-darwin }
          - { os: macos-15, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: head-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build -p dekit --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          name="dekit-${{ matrix.target }}"
          mkdir -p staging out
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp "target/${{ matrix.target }}/release/dekit.exe" "staging/dekit.exe"
            (cd staging && 7z a "../out/${name}.zip" dekit.exe >/dev/null)
          else
            cp "target/${{ matrix.target }}/release/dekit" "staging/dekit"
            tar -cJf "out/${name}.tar.xz" -C staging dekit
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: head-${{ matrix.target }}
          path: out/*
          retention-days: 3

  publish:
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: head-*
          path: out
          merge-multiple: true

      - name: Checksums
        run: |
          cd out
          for f in *.tar.xz *.zip; do
            [ -e "$f" ] && sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Force-update the `head` prerelease
        run: |
          gh release delete head --cleanup-tag --yes || true
          gh release create head out/* \
            --title "Latest master (head)" \
            --notes "Rolling build of the latest master commit (${GITHUB_SHA}). Updated on every push to master. Prerelease — not a stable release." \
            --prerelease \
            --target "${GITHUB_SHA}"
